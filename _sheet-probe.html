<!doctype html>
<html><head><meta charset="utf-8"><title>sheet-probe: matilda sheet-fitter instrumentation + gate A/B</title>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/" } }
</script>
<style>body{background:#14161a;color:#d8dbe0;font:12px/1.4 monospace;padding:16px}
#tag{color:#8b93a3}.done{color:#36d47e}pre{white-space:pre-wrap}</style></head>
<body><div id="tag">loading…</div><div id="status">running…</div><pre id="out"></pre>
<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { extractMeshes } from "./js/extract.js";
import { convert, BUILD_TAG } from "./engine/convert/converter.js";
import { buildPreview } from "./js/preview-mesh.js";
import { VIEW_DIRS, buildOrthoCamera, renderToPixels, maskFromSilhouette, unionBox } from "./test/views26.js";
import { interiorMisses, exteriorExcess, multiScaleSilhouette,
  HOLE_EROSION_RADIUS, PROTRUSION_DILATION_RADIUS } from "./test/metrics.js";

document.getElementById("tag").textContent = "BUILD_TAG: " + BUILD_TAG;
const SZ = 512, out = document.getElementById("out");
const WHITE = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(SZ, SZ);

async function loadObj(file){ const g=await new GLTFLoader().loadAsync(file); const o=g.scene; o.updateMatrixWorld(true);
  const b=new THREE.Box3().setFromObject(o); const h=b.max.y-b.min.y; if(h>1e-9){o.scale.multiplyScalar(2/h);o.updateMatrixWorld(true);} return o; }
function gateFor(obj, decs, params){ const pv=buildPreview(decs,params); const g=new THREE.BufferGeometry();
  g.setAttribute("position",new THREE.BufferAttribute(pv.positions,3));
  const rs=new THREE.Scene();rs.background=new THREE.Color(0);rs.add(new THREE.Mesh(g,WHITE));
  const ss=new THREE.Scene();ss.background=new THREE.Color(0);ss.add(obj);ss.overrideMaterial=WHITE;
  const box=unionBox(new THREE.Box3().setFromObject(obj),new THREE.Box3().setFromBufferAttribute(g.attributes.position));
  let sil=0,wh=-1,wp=-1,whv=-1,wpv=-1;
  for(let i=0;i<VIEW_DIRS.length;i++){const cam=buildOrthoCamera(VIEW_DIRS[i],box,1);
    const mA=maskFromSilhouette(renderToPixels(renderer,ss,cam,SZ)),mB=maskFromSilhouette(renderToPixels(renderer,rs,cam,SZ));
    sil+=multiScaleSilhouette(mA,mB,SZ,SZ);
    const h=interiorMisses(mA,mB,SZ,SZ,HOLE_EROSION_RADIUS);if(h.largestRegion>wh){wh=h.largestRegion;whv=i;}
    const pr=exteriorExcess(mB,mA,SZ,SZ,PROTRUSION_DILATION_RADIUS);if(pr.largestRegion>wp){wp=pr.largestRegion;wpv=i;}}
  ss.remove(obj);g.dispose();return{essSil:sil/VIEW_DIRS.length,holes:wh,whv,prot:wp,wpv};
}

// matilda is class-derived ON (reach 0.012). Add hyperSheet variants.
const CONF = [
  { label:"off(no sheet)", p:{} },
  { label:"sheet pa15", p:{ hyperSheet:true, sheetPlanarAngle:15 } },
  { label:"sheet pa20", p:{ hyperSheet:true, sheetPlanarAngle:20 } },
  { label:"sheet pa25", p:{ hyperSheet:true, sheetPlanarAngle:25 } },
  { label:"sheet pa30", p:{ hyperSheet:true, sheetPlanarAngle:30 } },
  { label:"sheet pa20 ins.85", p:{ hyperSheet:true, sheetPlanarAngle:20, sheetInscribe:0.85 } },
  { label:"sheet pa20 ins.95", p:{ hyperSheet:true, sheetPlanarAngle:20, sheetInscribe:0.95 } },
  { label:"sheet pa20 mf4", p:{ hyperSheet:true, sheetPlanarAngle:20, sheetMinFaces:4 } },
];
for(let run=1;run<=2;run++){
  const obj=await loadObj("test/models/matilda.glb"); const meshes=extractMeshes(obj).meshes;
  out.textContent+=`\n===== matilda run ${run} (BUILD ${BUILD_TAG}) =====\n`;
  out.textContent+=`config             | reg acc slabs shtCons | totCons resid preClamp drop | holes prot essSil (hv/pv)\n`;
  for(const c of CONF){ const res=convert({meshes},{mode:"hyper",maxDecorations:9990,...c.p}); const s=res.stats;
    const pc=(s.placements||res.decorations.length)+(s.dropped||0);
    const sh=s.sheet||{}; const g=gateFor(obj,res.decorations,res.params);
    const pass=(g.holes<=3&&g.prot<=3&&g.essSil>=0.90&&pc<=9990&&(s.dropped||0)===0);
    out.textContent+=`${c.label.padEnd(18)} | ${String(sh.regions??"-").padStart(3)} ${String(sh.accepted??"-").padStart(3)} ${String(s.sheetSlabs??"-").padStart(5)} ${String(sh.consumed??"-").padStart(7)} | ${String(s.replaceConsumed??"-").padStart(7)} ${String(s.replaceResidual??"-").padStart(5)} ${String(pc).padStart(8)} ${String(s.dropped||0).padStart(4)} | ${String(g.holes).padStart(5)} ${String(g.prot).padStart(4)} ${g.essSil.toFixed(3)} ${pass?"PASS":""} (h${g.whv}/p${g.wpv})\n`;
  }
}
document.getElementById("status").textContent="DONE"; document.getElementById("status").className="done";
console.log("SHEET_DONE");
</script></body></html>
