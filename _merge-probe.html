<!doctype html>
<html><head><meta charset="utf-8"><title>merge-probe: matilda relaxed coplanar-merge on replace residual</title>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/" } }
</script>
<style>body{background:#14161a;color:#d8dbe0;font:12px/1.4 monospace;padding:16px}
#tag{color:#8b93a3}.done{color:#36d47e}pre{white-space:pre-wrap}</style></head>
<body><div id="tag">loading…</div><div id="status">running…</div><pre id="out"></pre>
<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { extractMeshes } from "./js/extract.js";
import { convert, BUILD_TAG } from "./engine/convert/converter.js";
import { buildPreview } from "./js/preview-mesh.js";
import { VIEW_DIRS, buildOrthoCamera, renderToPixels, maskFromSilhouette, unionBox } from "./test/views26.js";
import { interiorMisses, exteriorExcess, multiScaleSilhouette, jaggednessRatio,
  HOLE_EROSION_RADIUS, PROTRUSION_DILATION_RADIUS } from "./test/metrics.js";

document.getElementById("tag").textContent = "BUILD_TAG: " + BUILD_TAG;
const SZ = 512, out = document.getElementById("out");
const WHITE = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(SZ, SZ);

// Bounded A/B: relaxed coplanar-merge on the replace residual only. matilda's best
// genuine config = replace ON, reach 0.012, NO snap. Sweep planarAngleDeg (merge
// aggressiveness) and colorTolerance. base planarAngleDeg ~1.
const BASE = { mode: "hyper", maxDecorations: 9990, hyperReplace: true, sphereMeshReachTol: 0.012 };
const CONFIGS = [
  { label: "base(pa~default,noSnap)", p: {} },
  { label: "pa5", p: { planarAngleDeg: 5 } },
  { label: "pa10", p: { planarAngleDeg: 10 } },
  { label: "pa20", p: { planarAngleDeg: 20 } },
  { label: "pa10+cTol30", p: { planarAngleDeg: 10, colorTolerance: 30 } },
  { label: "pa20+cTol45", p: { planarAngleDeg: 20, colorTolerance: 45 } },
  // reference: snap30 (the round-9 lossy lever) at same reach for comparison
  { label: "REF snap30", p: { hyperEmitSnapDeg: 30 } },
];

async function loadObj(file) {
  const gltf = await new GLTFLoader().loadAsync(file);
  const obj = gltf.scene; obj.updateMatrixWorld(true);
  const box = new THREE.Box3().setFromObject(obj);
  const h = box.max.y - box.min.y;
  if (h > 1e-9) { obj.scale.multiplyScalar(2 / h); obj.updateMatrixWorld(true); }
  return obj;
}
function gateFor(obj, decorations, params) {
  const preview = buildPreview(decorations, params);
  const g = new THREE.BufferGeometry();
  g.setAttribute("position", new THREE.BufferAttribute(preview.positions, 3));
  const rs = new THREE.Scene(); rs.background = new THREE.Color(0); rs.add(new THREE.Mesh(g, WHITE));
  const ss = new THREE.Scene(); ss.background = new THREE.Color(0); ss.add(obj); ss.overrideMaterial = WHITE;
  const box = unionBox(new THREE.Box3().setFromObject(obj), new THREE.Box3().setFromBufferAttribute(g.attributes.position));
  let silSum = 0, wh = -1, wp = -1, wj = -Infinity, whv = -1, wpv = -1;
  for (let i = 0; i < VIEW_DIRS.length; i++) {
    const cam = buildOrthoCamera(VIEW_DIRS[i], box, 1);
    const mA = maskFromSilhouette(renderToPixels(renderer, ss, cam, SZ));
    const mB = maskFromSilhouette(renderToPixels(renderer, rs, cam, SZ));
    silSum += multiScaleSilhouette(mA, mB, SZ, SZ);
    const h = interiorMisses(mA, mB, SZ, SZ, HOLE_EROSION_RADIUS); if (h.largestRegion > wh) { wh = h.largestRegion; whv = i; }
    const pr = exteriorExcess(mB, mA, SZ, SZ, PROTRUSION_DILATION_RADIUS); if (pr.largestRegion > wp) { wp = pr.largestRegion; wpv = i; }
    const j = jaggednessRatio(mA, mB, SZ, SZ); if (j > wj) wj = j;
  }
  ss.remove(obj); g.dispose();
  return { essSil: silSum / VIEW_DIRS.length, holes: wh, whv, prot: wp, wpv, jag: wj };
}

const results = {};
for (let run = 1; run <= 2; run++) {
  const obj = await loadObj("test/models/matilda.glb");
  const meshes = extractMeshes(obj).meshes;
  out.textContent += `\n===== matilda run ${run} (BUILD ${BUILD_TAG}) =====\n`;
  out.textContent += `config                     | preClamp drop afterMerge | holes prot | essSil  jag\n`;
  for (const cfg of CONFIGS) {
    const res = convert({ meshes }, { ...BASE, ...cfg.p });
    const s = res.stats;
    const preClamp = (s.placements || res.decorations.length) + (s.dropped || 0);
    const g = gateFor(obj, res.decorations, res.params);
    results[`r${run}_${cfg.label}`] = { preClamp, dropped: s.dropped || 0, afterMerge: s.afterMerge, ...g };
    const pass = (g.holes <= 3 && g.prot <= 3 && g.essSil >= 0.90 && preClamp <= 9990 && (s.dropped||0) === 0);
    out.textContent += `${cfg.label.padEnd(26)} | ${String(preClamp).padStart(7)} ${String(s.dropped||0).padStart(4)} ${String(s.afterMerge).padStart(9)} | ${String(g.holes).padStart(5)} ${String(g.prot).padStart(4)} | ${g.essSil.toFixed(3)} ${g.jag.toFixed(3)} ${pass?"PASS":""} (hv${g.whv})\n`;
  }
}
window.__MERGE = results;
document.getElementById("status").textContent = "DONE";
document.getElementById("status").className = "done";
console.log("MERGE_DONE");
</script></body></html>
