<!doctype html>
<html><head><meta charset="utf-8"><title>final-probe: p3r18 shipped-default double-run</title>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/" } }
</script>
<style>body{background:#14161a;color:#d8dbe0;font:12px/1.4 monospace;padding:16px}#tag{color:#8b93a3}.done{color:#36d47e}pre{white-space:pre-wrap}</style></head>
<body><div id="tag">loading…</div><div id="status">running…</div><pre id="out"></pre>
<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { extractMeshes } from "./js/extract.js";
import { convert, BUILD_TAG } from "./engine/convert/converter.js";
import { buildPreview } from "./js/preview-mesh.js";
import { VIEW_DIRS, buildOrthoCamera, renderToPixels, maskFromSilhouette, unionBox } from "./test/views26.js";
import { interiorMisses, exteriorExcess, multiScaleSilhouette, HOLE_EROSION_RADIUS, PROTRUSION_DILATION_RADIUS } from "./test/metrics.js";
document.getElementById("tag").textContent = "BUILD_TAG: " + BUILD_TAG;
const SZ=512, out=document.getElementById("out");
const WHITE=new THREE.MeshBasicMaterial({color:0xffffff,side:THREE.DoubleSide});
const renderer=new THREE.WebGLRenderer({antialias:false}); renderer.setSize(SZ,SZ);
async function loadObj(f){const g=await new GLTFLoader().loadAsync(f);const o=g.scene;o.updateMatrixWorld(true);const b=new THREE.Box3().setFromObject(o);const h=b.max.y-b.min.y;if(h>1e-9){o.scale.multiplyScalar(2/h);o.updateMatrixWorld(true);}return o;}
function gate(obj,decs,params){const pv=buildPreview(decs,params);const g=new THREE.BufferGeometry();g.setAttribute("position",new THREE.BufferAttribute(pv.positions,3));
  const rs=new THREE.Scene();rs.background=new THREE.Color(0);rs.add(new THREE.Mesh(g,WHITE));
  const ss=new THREE.Scene();ss.background=new THREE.Color(0);ss.add(obj);ss.overrideMaterial=WHITE;
  const box=unionBox(new THREE.Box3().setFromObject(obj),new THREE.Box3().setFromBufferAttribute(g.attributes.position));
  let sil=0,wh=-1,wp=-1;for(let i=0;i<VIEW_DIRS.length;i++){const cam=buildOrthoCamera(VIEW_DIRS[i],box,1);
    const mA=maskFromSilhouette(renderToPixels(renderer,ss,cam,SZ)),mB=maskFromSilhouette(renderToPixels(renderer,rs,cam,SZ));
    sil+=multiScaleSilhouette(mA,mB,SZ,SZ);const h=interiorMisses(mA,mB,SZ,SZ,HOLE_EROSION_RADIUS);if(h.largestRegion>wh)wh=h.largestRegion;
    const pr=exteriorExcess(mB,mA,SZ,SZ,PROTRUSION_DILATION_RADIUS);if(pr.largestRegion>wp)wp=pr.largestRegion;}
  ss.remove(obj);g.dispose();return{essSil:sil/VIEW_DIRS.length,holes:wh,prot:wp};}
const MODELS=[["shiba","test/models/shiba.glb"],["matilda","test/models/matilda.glb"],["stormterror","test/models/stormterror.glb"],["stylized_sword","test/models/stylized_sword.glb"]];
out.textContent+=`SHIPPED-DEFAULT DOUBLE-RUN (no flags) BUILD ${BUILD_TAG}\n`;
for(let run=1;run<=2;run++){
  out.textContent+=`\n-- run ${run} --\n`;
  for(const[name,file] of MODELS){
    const obj=await loadObj(file);const meshes=extractMeshes(obj).meshes;
    const res=convert({meshes},{mode:"hyper",maxDecorations:9990});const s=res.stats;const g=gate(obj,res.decorations,res.params);
    const pe=s.perEdgeInfl?`peEdge[${s.perEdgeInfl.full}/${s.perEdgeInfl.zero}/${s.perEdgeInfl.partial}]`:"peEdge[off]";
    out.textContent+=`${name.padEnd(15)} dec=${res.decorations.length} holes=${g.holes} prot=${g.prot} essSil=${g.essSil.toFixed(3)} ${pe}\n`;
  }
}
document.getElementById("status").textContent="DONE";document.getElementById("status").className="done";console.log("FINAL_DONE");
</script></body></html>
