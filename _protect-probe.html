<!doctype html>
<html><head><meta charset="utf-8"><title>protect-probe: matilda hole-vs-cap curve (eviction test)</title>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/" } }
</script>
<style>body{background:#14161a;color:#d8dbe0;font:12px/1.4 monospace;padding:16px}
#tag{color:#8b93a3}.done{color:#36d47e}pre{white-space:pre-wrap}</style></head>
<body><div id="tag">loading…</div><div id="status">running…</div><pre id="out"></pre>
<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { extractMeshes } from "./js/extract.js";
import { convert, BUILD_TAG } from "./engine/convert/converter.js";
import { buildPreview } from "./js/preview-mesh.js";
import { VIEW_DIRS, buildOrthoCamera, renderToPixels, maskFromSilhouette, unionBox } from "./test/views26.js";
import { interiorMisses, exteriorExcess, multiScaleSilhouette,
  HOLE_EROSION_RADIUS, PROTRUSION_DILATION_RADIUS } from "./test/metrics.js";

document.getElementById("tag").textContent = "BUILD_TAG: " + BUILD_TAG;
const SZ = 512, out = document.getElementById("out");
const WHITE = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(SZ, SZ);

async function loadObj(file) {
  const gltf = await new GLTFLoader().loadAsync(file);
  const obj = gltf.scene; obj.updateMatrixWorld(true);
  const box = new THREE.Box3().setFromObject(obj);
  const h = box.max.y - box.min.y;
  if (h > 1e-9) { obj.scale.multiplyScalar(2 / h); obj.updateMatrixWorld(true); }
  return obj;
}
function gateFor(obj, decorations, params) {
  const preview = buildPreview(decorations, params);
  const g = new THREE.BufferGeometry();
  g.setAttribute("position", new THREE.BufferAttribute(preview.positions, 3));
  const rs = new THREE.Scene(); rs.background = new THREE.Color(0); rs.add(new THREE.Mesh(g, WHITE));
  const ss = new THREE.Scene(); ss.background = new THREE.Color(0); ss.add(obj); ss.overrideMaterial = WHITE;
  const box = unionBox(new THREE.Box3().setFromObject(obj), new THREE.Box3().setFromBufferAttribute(g.attributes.position));
  let silSum = 0, wh = -1, wp = -1, whv = -1;
  for (let i = 0; i < VIEW_DIRS.length; i++) {
    const cam = buildOrthoCamera(VIEW_DIRS[i], box, 1);
    const mA = maskFromSilhouette(renderToPixels(renderer, ss, cam, SZ));
    const mB = maskFromSilhouette(renderToPixels(renderer, rs, cam, SZ));
    silSum += multiScaleSilhouette(mA, mB, SZ, SZ);
    const h = interiorMisses(mA, mB, SZ, SZ, HOLE_EROSION_RADIUS); if (h.largestRegion > wh) { wh = h.largestRegion; whv = i; }
    const pr = exteriorExcess(mB, mA, SZ, SZ, PROTRUSION_DILATION_RADIUS); if (pr.largestRegion > wp) wp = pr.largestRegion;
  }
  ss.remove(obj); g.dispose();
  return { essSil: silSum / VIEW_DIRS.length, holes: wh, whv, prot: wp };
}

// rely on class-derived default (matilda -> ON, reach 0.012, no snap). Sweep the cap.
const CAPS = [9990, 10500, 11500, 12500, 999999];
for (let run = 1; run <= 2; run++) {
  const obj = await loadObj("test/models/matilda.glb");
  const meshes = extractMeshes(obj).meshes;
  out.textContent += `\n===== matilda run ${run} (BUILD ${BUILD_TAG}) class-derived default =====\n`;
  out.textContent += `maxDec   | preClamp drop kept | holes prot | essSil  (hv)\n`;
  for (const cap of CAPS) {
    const res = convert({ meshes }, { mode: "hyper", maxDecorations: cap });
    const s = res.stats;
    const preClamp = (s.placements || res.decorations.length) + (s.dropped || 0);
    const g = gateFor(obj, res.decorations, res.params);
    out.textContent += `${String(cap).padStart(8)} | ${String(preClamp).padStart(7)} ${String(s.dropped||0).padStart(4)} ${String(res.decorations.length).padStart(5)} | ${String(g.holes).padStart(5)} ${String(g.prot).padStart(4)} | ${g.essSil.toFixed(3)} (hv${g.whv}) cls=${JSON.stringify(s.replaceClass)}\n`;
  }
}
document.getElementById("status").textContent = "DONE";
document.getElementById("status").className = "done";
console.log("PROTECT_DONE");
</script></body></html>
